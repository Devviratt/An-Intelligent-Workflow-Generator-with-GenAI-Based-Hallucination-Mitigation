services:
  - type: web
    name: workflow-generator
    env: python
    plan: free
    root: An-Intelligent-Workflow-Generator-with-GenAI-Based-Hallucination-Mitigation
    buildCommand: poetry install --no-root
    startCommand: uvicorn app:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
